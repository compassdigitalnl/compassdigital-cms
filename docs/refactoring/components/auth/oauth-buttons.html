<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OAuthButtons — Auth Component</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0A1628;
  --teal: #00897B;
  --white: #FAFBFC;
  --bg: #F5F7FA;
  --grey: #E8ECF1;
  --grey-mid: #94A3B8;
  --grey-dark: #64748B;
  --r-sm: 8px;
  --font: 'Plus Jakarta Sans', system-ui, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font); background: var(--bg); padding: 32px; }

.oauth-buttons {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 24px;
}

.oauth-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 13px 16px;
  background: var(--white);
  border: 1.5px solid var(--grey);
  border-radius: var(--r-sm);
  font-family: var(--font);
  font-size: 14px;
  font-weight: 600;
  color: var(--navy);
  cursor: pointer;
  transition: all 0.2s;
}

.oauth-btn:hover {
  border-color: var(--grey-mid);
  box-shadow: 0 1px 3px rgba(10,22,40,0.06);
  transform: translateY(-1px);
}

.oauth-btn svg {
  width: 20px;
  height: 20px;
}

.divider {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 24px;
  color: var(--grey-mid);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
}

.divider::before,
.divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--grey);
}

h1 {
  font-size: 20px;
  color: var(--navy);
  margin-bottom: 20px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--grey);
}
</style>
</head>
<body>

<h1>OAuthButtons — Live Demo</h1>

<div class="oauth-buttons">
  <button class="oauth-btn" onclick="alert('Google OAuth login')">
    <svg viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Inloggen met Google
  </button>
</div>

<div class="divider">of met e-mail</div>

<div style="margin-top:32px;padding:16px;background:var(--white);border:1px solid var(--grey);border-radius:12px;">
  <p style="font-size:13px;color:var(--grey-dark);line-height:1.7;">
    <strong>Source:</strong> plastimed-login-registratie.html lines 231-249, 622-627 |
    <strong>Features:</strong> Social login buttons (Google, can be extended to Facebook, Apple, etc.) |
    <strong>Usage:</strong> At top of login/register forms before email form |
    <strong>Divider:</strong> "of met e-mail" separator included
  </p>
</div>

</body>
</html>
