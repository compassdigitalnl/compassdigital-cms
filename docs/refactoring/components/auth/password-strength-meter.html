<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PasswordStrengthMeter — Auth Component</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0A1628;
  --teal: #00897B;
  --coral: #FF6B6B;
  --amber: #F59E0B;
  --white: #FAFBFC;
  --bg: #F5F7FA;
  --grey: #E8ECF1;
  --grey-dark: #64748B;
  --font: 'Plus Jakarta Sans', system-ui, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font); background: var(--bg); padding: 32px; }

.pw-strength {
  margin-top: 8px;
}

.pw-bar {
  height: 4px;
  background: var(--grey);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 4px;
}

.pw-fill {
  height: 100%;
  width: 0%;
  border-radius: 2px;
  transition: all 0.3s ease;
}

.pw-fill.weak {
  width: 33%;
  background: var(--coral);
}

.pw-fill.medium {
  width: 66%;
  background: var(--amber);
}

.pw-fill.strong {
  width: 100%;
  background: var(--teal);
}

.pw-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.03em;
}

.pw-label.weak {
  color: var(--coral);
}

.pw-label.medium {
  color: var(--amber);
}

.pw-label.strong {
  color: var(--teal);
}

.form-group {
  margin-bottom: 18px;
}

.form-label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 6px;
}

.form-input {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--grey);
  border-radius: 8px;
  font-family: var(--font);
  font-size: 14px;
  color: var(--navy);
  background: var(--white);
  transition: all 0.2s;
  outline: none;
}

.form-input:focus {
  border-color: var(--teal);
  box-shadow: 0 0 0 3px rgba(0,137,123,0.1);
}

h1 {
  font-size: 20px;
  color: var(--navy);
  margin-bottom: 20px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--grey);
}
</style>
</head>
<body>

<h1>PasswordStrengthMeter — Live Demo</h1>

<div class="form-group">
  <label class="form-label">Wachtwoord</label>
  <input
    type="password"
    class="form-input"
    placeholder="Min. 8 tekens"
    oninput="checkPwStrength(this.value)"
  >
  <div class="pw-strength">
    <div class="pw-bar">
      <div class="pw-fill" id="pw-fill"></div>
    </div>
    <span class="pw-label" id="pw-label"></span>
  </div>
</div>

<div style="margin-top:32px;padding:16px;background:var(--white);border:1px solid var(--grey);border-radius:12px;">
  <p style="font-size:13px;color:var(--grey-dark);line-height:1.7;">
    <strong>Source:</strong> plastimed-login-registratie.html lines 417-441, 849-870 |
    <strong>Features:</strong> Real-time password strength indicator (weak/medium/strong) |
    <strong>Criteria:</strong> Length ≥8, uppercase, lowercase, numbers, special chars |
    <strong>Visual:</strong> Progress bar (coral/amber/teal) + text label
  </p>
</div>

<script>
function checkPwStrength(pw) {
  const fill = document.getElementById('pw-fill');
  const label = document.getElementById('pw-label');

  if (!pw) {
    fill.className = 'pw-fill';
    label.textContent = '';
    return;
  }

  let score = 0;

  // Length
  if (pw.length >= 8) score++;
  if (pw.length >= 12) score++;

  // Character variety
  if (/[a-z]/.test(pw)) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;

  // Determine strength
  if (score <= 2) {
    fill.className = 'pw-fill weak';
    label.className = 'pw-label weak';
    label.textContent = 'ZWAK WACHTWOORD';
  } else if (score <= 4) {
    fill.className = 'pw-fill medium';
    label.className = 'pw-label medium';
    label.textContent = 'GEMIDDELD WACHTWOORD';
  } else {
    fill.className = 'pw-fill strong';
    label.className = 'pw-label strong';
    label.textContent = 'STERK WACHTWOORD';
  }
}
</script>

</body>
</html>
