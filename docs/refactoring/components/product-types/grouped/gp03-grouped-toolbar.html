<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GP03: Grouped Product Toolbar — Compass Design System</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root {
  --navy: #0A1628;
  --teal: #00897B;
  --grey: #E8ECF1;
  --grey-dark: #64748B;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: #F5F7FA;
  padding: 24px;
}

.product-toolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
  gap: 16px;
  flex-wrap: wrap;
}

.view-toggle {
  display: flex;
  gap: 8px;
}

.view-toggle-btn {
  padding: 8px 12px;
  border: 1.5px solid var(--grey);
  background: white;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 600;
  color: var(--grey-dark);
}

.view-toggle-btn i {
  width: 16px;
  height: 16px;
}

.view-toggle-btn.active {
  background: var(--teal);
  border-color: var(--teal);
  color: white;
}

.view-toggle-btn:hover:not(.active) {
  border-color: var(--teal);
  color: var(--teal);
}

.bulk-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}

.bulk-action-btn {
  padding: 8px 16px;
  border: 1.5px solid var(--grey);
  background: white;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 13px;
  font-weight: 600;
  color: var(--grey-dark);
  display: flex;
  align-items: center;
  gap: 6px;
}

.bulk-action-btn i {
  width: 14px;
  height: 14px;
}

.bulk-action-btn:hover {
  border-color: var(--teal);
  color: var(--teal);
}

@media (max-width: 768px) {
  .product-toolbar {
    flex-direction: column;
    align-items: stretch;
  }

  .bulk-actions {
    flex-wrap: wrap;
  }
}
</style>
</head>
<body>

<div style="max-width: 1200px; margin: 0 auto;">
  <div class="product-toolbar">
    <div class="view-toggle">
      <button class="view-toggle-btn active" data-view="grid">
        <i data-lucide="grid-2x2"></i>
        Grid
      </button>
      <button class="view-toggle-btn" data-view="list">
        <i data-lucide="list"></i>
        Lijst
      </button>
    </div>

    <div class="bulk-actions">
      <button class="bulk-action-btn" id="selectAllBtn">
        <i data-lucide="check-square"></i>
        Selecteer alles
      </button>
      <button class="bulk-action-btn" id="deselectAllBtn">
        <i data-lucide="square"></i>
        Deselecteer alles
      </button>
    </div>
  </div>
</div>

<script>
lucide.createIcons();

document.querySelectorAll('.view-toggle-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.view-toggle-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    console.log('View changed to:', btn.dataset.view);
  });
});
</script>

<!-- DOCUMENTATION: GP03 Grouped Product Toolbar -->
</body>
</html>
