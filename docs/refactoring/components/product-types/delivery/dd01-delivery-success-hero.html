<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DD01: Delivery Success Hero — Compass Design System</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root {
  --navy: #0A1628;
  --teal: #00897B;
  --grey: #E8ECF1;
  --grey-mid: #94A3B8;
  --green: #00C853;
  --green-light: #E8F5E9;
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: #F5F7FA;
  color: var(--navy);
  padding: 24px;
}

.success-hero {
  text-align: center;
  padding: 48px 24px;
  max-width: 600px;
  margin: 0 auto;
}

.success-pulse {
  width: 88px;
  height: 88px;
  border-radius: 50%;
  background: var(--green-light);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 18px;
  position: relative;
  animation: pop 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.success-pulse::after {
  content: '';
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  border: 2px solid var(--green);
  opacity: 0.2;
  animation: pulse 2s infinite;
}

.success-pulse i {
  width: 40px;
  height: 40px;
  color: var(--green);
  z-index: 2;
  position: relative;
}

@keyframes pop {
  0% { transform: scale(0); }
  50% { transform: scale(1.15); }
  100% { transform: scale(1); }
}

@keyframes pulse {
  0% { transform: scale(1); opacity: 0.2; }
  100% { transform: scale(1.3); opacity: 0; }
}

.success-title {
  font-size: 28px;
  font-weight: 800;
  margin-bottom: 8px;
  color: var(--navy);
}

.success-subtitle {
  font-size: 14px;
  color: var(--grey-mid);
  margin-bottom: 20px;
  line-height: 1.5;
}

.order-id {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: var(--grey);
  border-radius: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  color: var(--navy);
  margin-bottom: 16px;
}

.order-id i {
  width: 14px;
  height: 14px;
  color: var(--teal);
}

.confirmation-text {
  font-size: 13px;
  color: var(--grey-mid);
  line-height: 1.6;
}

.confirmation-text strong {
  color: var(--navy);
  font-weight: 600;
}

@media (max-width: 640px) {
  .success-hero {
    padding: 32px 16px;
  }

  .success-title {
    font-size: 24px;
  }

  .success-pulse {
    width: 72px;
    height: 72px;
  }

  .success-pulse i {
    width: 32px;
    height: 32px;
  }
}
</style>
</head>
<body>

<div style="max-width: 1240px; margin: 0 auto;">

<!-- ============================================
     LIVE DEMO
     ============================================ -->

<div class="success-hero">
  <div class="success-pulse">
    <i data-lucide="check"></i>
  </div>

  <h1 class="success-title">Download succesvol!</h1>

  <p class="success-subtitle">
    Je bestelling is verwerkt en je download is direct beschikbaar.
  </p>

  <div class="order-id">
    <i data-lucide="hash"></i>
    <span>12847</span>
  </div>

  <p class="confirmation-text">
    We hebben een bevestigingsmail gestuurd naar <strong>jouw@email.nl</strong><br>
    met je licentiegegevens en downloadlinks.
  </p>
</div>

</div>

<script>
lucide.createIcons();
</script>

<!--
COMPONENT: DD01 — Delivery Success Hero
PURPOSE: Post-purchase success confirmation for digital product downloads
PATTERN: Centered hero with animated checkmark, order ID, confirmation message
USE CASE: Thank you page after digital product purchase (software, templates, ebooks, courses)

DESIGN TOKENS:
- Success circle: 88×88px (72px mobile), green-light bg (#E8F5E9)
- Checkmark icon: 40×40px (32px mobile), green color (#00C853)
- Pulse ring: -8px offset, 2px border, green (#00C853), 0.2 opacity
- Title: 28px (24px mobile), 800 weight, navy color
- Subtitle: 14px, grey-mid color
- Order ID: JetBrains Mono 13px, grey bg (#E8ECF1), teal hash icon
- Confirmation text: 13px, grey-mid, 1.6 line-height
- Max-width: 600px container
- Padding: 48px 24px (32px 16px mobile)

ANIMATIONS:
- Pop animation: 0.5s cubic-bezier
  - 0%: scale(0)
  - 50%: scale(1.15) (overshoot)
  - 100%: scale(1)
- Pulse ring animation: 2s infinite
  - 0%: scale(1), opacity 0.2
  - 100%: scale(1.3), opacity 0
- Triggers: On page load (automatic)

REACT INTERFACE:
interface DeliverySuccessHeroProps {
  orderId: string
  userEmail: string
  title?: string // Default: "Download succesvol!"
  subtitle?: string // Default: "Je bestelling is verwerkt..."
  confirmationMessage?: string // Custom confirmation text
  showOrderId?: boolean // Default: true
  showEmail?: boolean // Default: true
  animationDuration?: number // Default: 500ms
  pulseInterval?: number // Default: 2000ms
}

LAYOUT RULES:
1. **Centering**:
   - Container: max-width 600px, margin 0 auto
   - All content: text-align center
   - Success pulse: margin 0 auto

2. **Spacing**:
   - Container padding: 48px 24px (32px 16px mobile)
   - Pulse to title: 18px
   - Title to subtitle: 8px
   - Subtitle to order ID: 20px
   - Order ID to confirmation: 16px

3. **Responsive**:
   - @640px: reduce title 28px → 24px
   - @640px: reduce pulse 88px → 72px
   - @640px: reduce icon 40px → 32px
   - @640px: reduce padding 48px → 32px

ACCESSIBILITY:
- Success icon: role="img" aria-label="Success"
- Semantic HTML: <h1> for title, <p> for messages
- Order ID: aria-label="Order number 12847"
- Email: <strong> for emphasis, screen readers announce
- Animation: prefers-reduced-motion support
- Color contrast: green icon on green-light bg = 4.5:1+ (AA)
- Focus management: none needed (static content)

IMPLEMENTATION NOTES:
1. **Auto-play Animation**:
   - Triggers automatically on page load
   - No JavaScript needed (CSS animation)
   - Infinite pulse for ongoing feedback

2. **Order ID Format**:
   - Monospace font for readability
   - Hash icon prefix (visual anchor)
   - Copy-to-clipboard variant available (add button)

3. **Email Personalization**:
   - Server-side rendering with user email
   - Strong tag for visual emphasis
   - Mailto link optional

4. **Reduced Motion**:
   ```css
   @media (prefers-reduced-motion: reduce) {
     .success-pulse {
       animation: none;
     }
     .success-pulse::after {
       animation: none;
       opacity: 0.2;
     }
   }
   ```

5. **Error State Variant**:
   - Change green to coral (#FF6B6B)
   - Change check icon to alert-circle
   - Update title: "Er is iets misgegaan"
   - Show support contact info

VARIATIONS:
1. **Default** (shown above):
   - Green success checkmark
   - Order ID visible
   - Email confirmation shown

2. **Compact**:
   - Smaller pulse (64px)
   - Smaller title (20px)
   - No subtitle
   - Mobile-optimized

3. **With CTA Buttons**:
   - Add buttons below confirmation:
     - "Download nu" (primary teal)
     - "Bekijk bestelling" (secondary outline)

4. **Free Download** (no order):
   - Hide order ID
   - Change subtitle: "Je download is direct beschikbaar"
   - No email confirmation

RELATED COMPONENTS:
- DD02 (ProductDownloadCard): Product info + download buttons below hero
- DD03 (LicenseKeyDisplay): License key card below hero
- DD05 (GettingStartedSteps): Next steps guide
- OC01 (OrderSuccessHero): Similar pattern for physical products

NEXT.JS IMPLEMENTATION:
'use client'

import { Check } from 'lucide-react'
import { useEffect, useState } from 'react'

export default function DeliverySuccessHero({
  orderId,
  userEmail,
  title = 'Download succesvol!',
  subtitle = 'Je bestelling is verwerkt en je download is direct beschikbaar.',
  showOrderId = true,
  showEmail = true,
}: DeliverySuccessHeroProps) {
  const [isAnimating, setIsAnimating] = useState(false)

  useEffect(() => {
    setIsAnimating(true)
  }, [])

  return (
    <div className="success-hero">
      <div className={`success-pulse ${isAnimating ? 'animate' : ''}`}>
        <Check className="w-10 h-10 text-green" />
      </div>

      <h1 className="success-title">{title}</h1>
      <p className="success-subtitle">{subtitle}</p>

      {showOrderId && (
        <div className="order-id" aria-label={`Order number ${orderId}`}>
          <Hash className="w-3.5 h-3.5 text-teal" />
          <span>{orderId}</span>
        </div>
      )}

      {showEmail && (
        <p className="confirmation-text">
          We hebben een bevestigingsmail gestuurd naar{' '}
          <strong>{userEmail}</strong>
          <br />
          met je licentiegegevens en downloadlinks.
        </p>
      )}
    </div>
  )
}

□ Reduced motion: animations disabled
□ Color contrast meets AA (4.5:1+)
□ Screen reader announces success message
□ Works without JavaScript (CSS animations)

</body>
